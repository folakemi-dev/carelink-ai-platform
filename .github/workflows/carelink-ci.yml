name: CareLink CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: services/frontend
        run: npm install

      - name: Build frontend
        working-directory: services/frontend
        run: npm run build

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - frontend
          - api-gateway
          - auth-service
          - patient-service
          - appointment-service
          - notification-service
          - ai-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t carelink-${{ matrix.service }}:ci ./services/${{ matrix.service }}

  helm-lint:
    name: Validate Helm Chart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint ./helm/carelink

      - name: Render Helm templates
        run: helm template carelink-ci ./helm/carelink
