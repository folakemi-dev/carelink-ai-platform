apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
  namespace: carelink-dev
  labels:
    app: patient-service
    environment: development
    project: carelink-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
        environment: development
        project: carelink-ai
    spec:
      containers:
        - name: patient-service
          image: carelink-patient-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8002
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: patient-service
  namespace: carelink-dev
  labels:
    app: patient-service
    environment: development
    project: carelink-ai
spec:
  type: ClusterIP
  selector:
    app: patient-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8002