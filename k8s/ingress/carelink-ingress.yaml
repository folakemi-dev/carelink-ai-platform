apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: carelink-frontend-ingress
  namespace: carelink-dev
  labels:
    project: carelink-ai
    environment: development
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: carelink-api-ingress
  namespace: carelink-dev
  labels:
    project: carelink-ai
    environment: development
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
